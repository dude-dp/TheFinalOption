syntax = "proto3";

package com.upstox.marketdatafeeder.rpc.proto;

message FeedResponse {
  map<string, Feed> feeds = 1;
}

message Feed {
  FullFeed fullFeed = 2;
}

message FullFeed {
  FF ff = 1;
}

message FF {
  MarketFF marketFF = 1;
}

message MarketFF {
  LTPC ltpc = 1;
  MarketLevel marketLevel = 2; // Injecting Market Depth parsing
}

message LTPC {
  double ltp = 1;
}

// Structuring the Top 5 Order Book levels
message MarketLevel {
  repeated Quote bidAskQuote = 1; 
}

message Quote {
  int32 bq = 1;  // Bid Quantity
  double bp = 2; // Bid Price
  int32 bno = 3; // Bid Number of Orders
  int32 aq = 4;  // Ask Quantity
  double ap = 5; // Ask Price
  int32 ano = 6; // Ask Number of Orders
}